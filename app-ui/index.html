<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/_mar/favicon.svg" />
    <title>Mar App UI</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top left, #f3f7ff, #eef2f8 50%, #e8eef5 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/_mar/dist/app.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get('api') || window.location.origin;
      const schemaCacheKey = `marAppUiSchema:${apiBase}`;

      let cachedSchema = null;
      let cachedSchemaVersion = null;

      try {
        const raw = window.localStorage.getItem(schemaCacheKey);
        if (raw) {
          const parsed = JSON.parse(raw);
          cachedSchema = parsed.schema ?? null;
          cachedSchemaVersion = parsed.schemaVersion ?? null;
        }
      } catch (_) {}

      const app = Elm.Main.init({
        node: document.getElementById('app'),
        flags: {
          apiBase,
          authToken: '',
          systemAuthToken: '',
          cachedSchema,
          cachedSchemaVersion,
          viewportWidth: window.innerWidth || 1280
        }
      });

      if (app.ports && app.ports.saveSession) {
        app.ports.saveSession.subscribe(() => {});
      }

      if (app.ports && app.ports.saveSchemaCache) {
        app.ports.saveSchemaCache.subscribe((payload) => {
          try {
            window.localStorage.setItem(schemaCacheKey, JSON.stringify(payload));
          } catch (_) {}
        });
      }
    </script>
  </body>
</html>
