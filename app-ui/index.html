<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/_mar/favicon.svg" />
    <title>Mar App UI</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top left, #f3f7ff, #eef2f8 50%, #e8eef5 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script id="mar-bootstrap" type="application/json">__MAR_BOOTSTRAP_JSON__</script>
    <script src="/_mar/dist/app.js"></script>
    <script>
      function readEmbeddedBootstrap() {
        try {
          const bootstrapNode = document.getElementById('mar-bootstrap');
          const bootstrapText = bootstrapNode ? bootstrapNode.textContent : '';

          if (!bootstrapText) {
            return null;
          }

          const payload = JSON.parse(bootstrapText);
          const schema = payload?.schema ?? null;
          const schemaVersion = payload?.version?.app?.manifestHash ?? null;

          if (!schema) {
            return null;
          }

          return { schema, schemaVersion };
        } catch (_) {
          return null;
        }
      }

      (() => {
        const params = new URLSearchParams(window.location.search);
        const apiBase = params.get('api') || window.location.origin;
        const initialBootstrap = readEmbeddedBootstrap();

        const app = Elm.Main.init({
          node: document.getElementById('app'),
          flags: {
            apiBase,
            authToken: '',
            systemAuthToken: '',
            cachedSchema: initialBootstrap?.schema ?? null,
            cachedSchemaVersion: initialBootstrap?.schemaVersion ?? null,
            viewportWidth: window.innerWidth || 1280
          }
        });

        if (app.ports && app.ports.saveSession) {
          app.ports.saveSession.subscribe(() => {});
        }
      })();
    </script>
  </body>
</html>
