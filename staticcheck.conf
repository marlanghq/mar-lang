# staticcheck configuration for mar.
#
# Run with: staticcheck ./...
# (staticcheck reads this file from the project root automatically.)

# ST1005 (error strings should not be capitalized) is disabled because
# the runtime returns errors that surface directly in user-facing
# diagnostics (compile-error banners in the browser, error overlays in
# the iOS app, REPL output). They almost always start with the qualified
# name of the builtin that failed — "Entity.define: expected ...",
# "View.render: ..." — and lowercasing the leading capital would
# misspell the language's actual module name. They aren't composed via
# fmt.Errorf("ctx: %w", err) chains where the convention would matter.
checks = ["all", "-ST1005"]
