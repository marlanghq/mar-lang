<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/_mar/admin/favicon.svg" />
    <title>Mar Admin</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top left, #f3f7ff, #eef2f8 50%, #e8eef5 100%);
      }

      .auth-stage-email,
      .auth-stage-code,
      .auth-stage-session {
        animation: auth-stage-enter 160ms ease-out;
      }

      @keyframes auth-stage-enter {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/_mar/admin/dist/app.js"></script>
    <script>
      const sessionStorageKey = 'mar.admin.session';

      function clearLegacySessionStorage() {
        try {
          window.localStorage.removeItem(sessionStorageKey);
        } catch (_) {}
      }

      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get('api') || window.location.origin;
      clearLegacySessionStorage();

      const app = Elm.Main.init({
        node: document.getElementById('app'),
        flags: {
          apiBase,
          authToken: '',
          systemAuthToken: ''
        }
      });

      if (app.ports && app.ports.saveSession) {
        app.ports.saveSession.subscribe(() => {});
      }
    </script>
  </body>
</html>
