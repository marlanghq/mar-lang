<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belm Admin</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top left, #f3f7ff, #eef2f8 50%, #e8eef5 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./dist/app.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get('api') || 'http://localhost:4100';
      Elm.Main.init({
        node: document.getElementById('app'),
        flags: { apiBase }
      });
    </script>
  </body>
</html>
